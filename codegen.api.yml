overwrite: true
generates:
  src/generated/graphql.tsx:
    schema:
      - ${CODEGEN_API_GRAPHQL}
      - './src/core/apolloClient/graphqlResolvers.tsx'
    documents:
      [
        'src/**/*.tsx',
        'src/**/*.ts',
        '!src/pages/auth/PortalInit.tsx',
        '!src/pages/customerPortal/CustomerPortal.tsx',
        '!src/components/customerPortal/*.tsx',
        '!src/components/customerPortal/*.ts',
      ]
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-react-apollo'
    config:
      reactApolloVersion: 3
      exportFragmentSpreadSubTypes: true
